<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#ff0000;
  color:white;
}

.poke{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* モーダル */
#modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-inner{
  background:white;
  margin:20% auto;
  padding:20px;
  width:80%;
  border-radius:12px;
}
</style>
</head>

<body>

<header>構築AI 完全版</header>

<div class="card">
メガ数
<select id="megaCount">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<button onclick="gen()">構築生成</button>
</div>

<div id="out"></div>

<!-- モーダル -->
<div id="modal">
  <div class="modal-inner">
    <div id="modalContent"></div>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>

/* ===== データ（軽量） ===== */
const ALL_POKEMON = [
"ガブリアス","カイリュー","ドラパルト","ミミッキュ",
"ドドゲザン","サザンドラ","ウルガモス","ゲンガー",
"ドヒドイデ","アーマーガア","カバルドン",
"ロトム","エルフーン",
"ペリッパー","バンギラス","ギャラドス","ルカリオ"
];

const ALL_MEGA = [
"メガガルーラ","メガゲンガー","メガハッサム",
"メガギャラドス","メガバンギラス",
"メガルカリオ","メガサーナイト",
"メガフシギバナ","メガリザードンX","メガリザードンY","メガカメックス"
];

const REAL_MEGA = new Set(ALL_MEGA);

/* ===== Tier ===== */
const TIER = {
"ガブリアス":5,"カイリュー":5,"ドラパルト":5,
"ミミッキュ":4,"ドドゲザン":4,"サザンドラ":4
};

/* ===== 役割 ===== */
const ROLE = {

"ガブリアス":["physical","sweeper"],
"カイリュー":["physical","setup"],
"ドドゲザン":["physical","sweeper"],
"ミミッキュ":["physical","setup"],

"ドラパルト":["special","sweeper"],
"サザンドラ":["special","breaker"],
"ウルガモス":["special","setup"],

"ドヒドイデ":["wall","cycle"],
"アーマーガア":["wall","cycle"],
"カバルドン":["wall","weather"],

"ロトム":["cycle","pivot"],
"エルフーン":["support"],

"ペリッパー":["weather"],
"バンギラス":["weather"],

"ゲンガー":["offense"],
"ルカリオ":["offense"],
"ギャラドス":["setup"]
};

function base(p){return p.replace("メガ","");}

/* ===== 育成データ ===== */
const BUILD = {

"ガブリアス":{
  nature:"ようき",
  ability:"さめはだ",
  ev:"A252 S252 H4",
  moves:["じしん","げきりん","つるぎのまい","ステルスロック"]
},

"ドラパルト":{
  nature:"おくびょう",
  ability:"すりぬけ",
  ev:"C252 S252 H4",
  moves:["シャドーボール","りゅうせいぐん","だいもんじ","とんぼがえり"]
},

"ミミッキュ":{
  nature:"いじっぱり",
  ability:"ばけのかわ",
  ev:"A252 S252 H4",
  moves:["じゃれつく","かげうち","つるぎのまい","ドレインパンチ"]
},

"ドドゲザン":{
  nature:"いじっぱり",
  ability:"そうだいしょう",
  ev:"A252 H252 S4",
  moves:["ドゲザン","ふいうち","アイアンヘッド","つるぎのまい"]
},

"カイリュー":{
  nature:"いじっぱり",
  ability:"マルチスケイル",
  ev:"A252 S252 H4",
  moves:["しんそく","りゅうのまい","じしん","テラバースト"]
}

};

/* ===== 軽量プール ===== */
function getPool(){

  let strong = ALL_POKEMON.filter(p => (TIER[p]||1)>=3);

  let random = [...ALL_POKEMON]
    .sort(()=>0.5-Math.random())
    .slice(0,10);

  return [...new Set([...strong,...random])];
}

/* ===== スコア ===== */
function calcScore(team,c){

  let score = TIER[base(c)] || 1;

  team.forEach(()=> score += 1);

  return score;
}

/* ===== 選出 ===== */
function pickBest(team,pool){

  let sample = pool.sort(()=>0.5-Math.random()).slice(0,5);

  let best=null,bestScore=-999;

  sample.forEach(p=>{
    if(team.includes(p)) return;

    let s = calcScore(team,p);

    if(s>bestScore){
      bestScore=s;
      best=p;
    }
  });

  return best;
}

/* ===== メガ ===== */
function pickMega(n){

  let pool = ALL_MEGA.filter(p => REAL_MEGA.has(p));
  pool = pool.sort(()=>0.5-Math.random());

  return pool.slice(0,n);
}

/* ===== 構築タイプ ===== */
function detectBuildType(team){

  let score={
    "スタン":1,
    "サイクル":0,
    "対面":0,
    "天候":0,
    "受け":0
  };

  team.forEach(p=>{
    let r = ROLE[base(p)]||[];

    if(r.includes("wall")) score["受け"]+=2;
    if(r.includes("cycle")) score["サイクル"]+=2;
    if(r.includes("pivot")) score["サイクル"]+=1;

    if(r.includes("offense")) score["対面"]+=2;
    if(r.includes("sweeper")) score["対面"]+=1;

    if(r.includes("weather")) score["天候"]+=3;
  });

  return Object.keys(score).reduce((a,b)=> score[a]>score[b]?a:b);
}

/* ===== 勝ち筋 ===== */
function getWinCondition(team){

  let hasSetup=false,hasWall=false,hasWeather=false,hasOffense=false;

  team.forEach(p=>{
    let r = ROLE[base(p)] || [];

    if(r.includes("setup")) hasSetup=true;
    if(r.includes("wall")) hasWall=true;
    if(r.includes("weather")) hasWeather=true;
    if(r.includes("offense")||r.includes("sweeper")) hasOffense=true;
  });

  if(hasWeather) return "天候展開 → エースで全抜き";
  if(hasSetup && hasOffense) return "積みエースを通して全抜き";
  if(hasWall && hasOffense) return "受け回しから削って詰め";
  if(hasOffense) return "対面性能で押し切る";

  return "バランス良く戦う";
}

/* ===== 生成 ===== */
function gen(){

  let team=[];

  let megaCount=parseInt(document.getElementById("megaCount").value);

  team = team.concat(pickMega(megaCount));

  let pool = getPool();

  while(team.length<6){
    let p = pickBest(team,pool);
    if(!p) break;
    team.push(p);
  }

  render(team);
}

/* ===== 表示 ===== */
function render(team){

  let type = detectBuildType(team);
  let win = getWinCondition(team);

  let html = `<div class="card">
  <b>構築タイプ：${type}</b><br>
  <b>勝ち筋：${win}</b><br><br>`;

  team.forEach(p=>{
    html += `<div class="poke" onclick="showDetail('${p}')">${p}</div>`;
  });

  html += `</div>`;

  document.getElementById("out").innerHTML = html;
}

/* ===== 詳細表示 ===== */
function showDetail(name){

  let b = BUILD[base(name)];

  if(!b){
    document.getElementById("modalContent").innerHTML =
      `<b>${name}</b><br>データなし`;
  }else{
    document.getElementById("modalContent").innerHTML =
      `<b>${name}</b><br><br>
      性格：${b.nature}<br>
      特性：${b.ability}<br>
      努力値：${b.ev}<br>
      技：${b.moves.join(" / ")}`;
  }

  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>
</body>
</html>
