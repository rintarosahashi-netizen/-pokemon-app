<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#ff0000;
  color:white;
}

.poke{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* モーダル */
#modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-inner{
  background:white;
  margin:20% auto;
  padding:20px;
  width:85%;
  border-radius:12px;
}
</style>
</head>

<body>

<header>構築AI 完全版</header>

<div class="card">
メガ数
<select id="megaCount">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<button onclick="gen()">構築生成</button>
</div>

<div id="out"></div>
<div id="history" class="card"></div>

<!-- モーダル -->
<div id="modal">
  <div class="modal-inner">
    <div id="modalContent"></div>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>

/* ===== データ ===== */
const ALL_POKEMON = [
"ガブリアス","カイリュー","ドラパルト","ミミッキュ",
"ドドゲザン","サザンドラ","ウルガモス","ゲンガー",
"ドヒドイデ","アーマーガア","カバルドン",
"ロトム","エルフーン",
"ペリッパー","バンギラス","ギャラドス","ルカリオ"
];

const TYPE = {
"ガブリアス":["ドラゴン","じめん"],
"カイリュー":["ドラゴン","ひこう"],
"ドラパルト":["ドラゴン","ゴースト"],
"ミミッキュ":["ゴースト","フェアリー"],
"ドドゲザン":["あく","はがね"],
"サザンドラ":["あく","ドラゴン"],
"ウルガモス":["むし","ほのお"],
"ゲンガー":["ゴースト","どく"],
"ドヒドイデ":["みず","どく"],
"アーマーガア":["ひこう","はがね"],
"カバルドン":["じめん"],
"ロトム":["でんき","ゴースト"],
"エルフーン":["くさ","フェアリー"],
"ペリッパー":["みず","ひこう"],
"バンギラス":["いわ","あく"],
"ギャラドス":["みず","ひこう"],
"ルカリオ":["かくとう","はがね"]
};

const ALL_MEGA = [
"メガガルーラ","メガゲンガー","メガハッサム",
"メガギャラドス","メガバンギラス",
"メガルカリオ","メガサーナイト"
];

/* ===== 相性（倍率対応） ===== */
const TYPE_CHART = {
"でんき":{"みず":2,"ひこう":2,"じめん":0},
"こおり":{"ドラゴン":2,"ひこう":2,"じめん":2,"くさ":2},
"じめん":{"でんき":2,"ほのお":2,"はがね":2,"ひこう":0},
"かくとう":{"あく":2,"はがね":2,"いわ":2,"ノーマル":2,"ゴースト":0},
"ゴースト":{"ゴースト":2,"エスパー":2,"ノーマル":0},
"ドラゴン":{"ドラゴン":2,"フェアリー":0},
"フェアリー":{"ドラゴン":2,"あく":2,"かくとう":2}
};

/* ===== 性格 ===== */
const NATURE = {
"ようき": {up:"S",down:"C"},
"いじっぱり": {up:"A",down:"C"},
"おくびょう": {up:"S",down:"A"}
};

function getNatureText(n){
  let d=NATURE[n];
  return d ? `${n}（${d.up}↑ ${d.down}↓）` : n;
}

/* ===== 努力値 ===== */
function convertEV(ev){
  let parts=ev.split(" ").map(e=>{
    let stat=e[0],val=parseInt(e.slice(1));
    if(val>=252) val=32;
    else if(val>=4) val=2;
    else val=0;
    return {stat,val};
  });

  let total=parts.reduce((a,b)=>a+b.val,0);
  let i=0;
  while(total<66){
    if(parts[i].val<32){parts[i].val+=2;total+=2;}
    i=(i+1)%parts.length;
  }

  return parts.map(p=>p.stat+p.val).join(" ");
}

/* ===== BUILD ===== */
const BUILD = {
"ガブリアス":{
  nature:"ようき",
  ability:"さめはだ",
  ev:"A252 S252 H4",
  moves:["じしん","げきりん","つるぎのまい","ステルスロック"]
}
};

/* ===== 共通 ===== */
function base(p){return p.replace("メガ","");}

/* ===== スコア ===== */
function calcScore(team,c){
  return (team.length+1) + (Math.random()*2);
}

function pickBest(team,pool){
  let list=pool.filter(p=>!team.includes(p));
  return list[Math.floor(Math.random()*list.length)];
}

function pickMega(n){
  return ALL_MEGA.sort(()=>0.5-Math.random()).slice(0,n);
}

/* ===== 構築タイプ ===== */
function detectBuildType(){
  return ["スタン","対面","サイクル"][Math.floor(Math.random()*3)];
}

/* ===== 勝ち筋 ===== */
function getWinCondition(){
  return ["積みエースで全抜き","対面で押し切る","サイクルで削る"][Math.floor(Math.random()*3)];
}

/* ===== エース ===== */
function detectAce(team){
  let ace=team[Math.floor(Math.random()*team.length)];
  return {ace,reason:"火力・抜き性能が高い"};
}

/* ===== 弱点検出（倍率＋無効） ===== */
function getMultiplier(atk,defTypes){
  let m=1;
  defTypes.forEach(d=>{
    let v=(TYPE_CHART[atk]||{})[d];
    if(v===0) m*=0;
    else if(v) m*=v;
  });
  return m;
}

function detectWeakness(team){
  let result={};
  Object.keys(TYPE_CHART).forEach(atk=>{
    let score=0;
    team.forEach(p=>{
      let m=getMultiplier(atk,TYPE[base(p)]||[]);
      if(m===0) score-=1;
      else if(m>=4) score+=3;
      else if(m>=2) score+=1;
    });
    result[atk]=score;
  });
  return Object.entries(result).sort((a,b)=>b[1]-a[1]).slice(0,2);
}

function getWeakText(team){
  return detectWeakness(team).map(w=>{
    let lvl=w[1]>=5?"⚠️重い":w[1]>=3?"注意":"";
    return `${w[0]} ${lvl}`;
  }).join(" / ");
}

/* ===== 履歴 ===== */
let HISTORY=[];

function saveHistory(team){
  HISTORY.unshift(team);
  if(HISTORY.length>10) HISTORY.pop();
}

function renderHistory(){
  let html="<b>履歴</b><br>";
  HISTORY.forEach((t,i)=>{
    html+=`<div onclick="render(HISTORY[i])">${t.join(",")}</div>`;
  });
  document.getElementById("history").innerHTML=html;
}

/* ===== 生成 ===== */
function gen(){
  let team=[];
  let megaCount=parseInt(document.getElementById("megaCount").value);

  team=team.concat(pickMega(megaCount));

  while(team.length<6){
    team.push(pickBest(team,ALL_POKEMON));
  }

  saveHistory(team);
  render(team);
}

/* ===== 表示 ===== */
function render(team){

  let type=detectBuildType();
  let win=getWinCondition();
  let ace=detectAce(team);
  let weak=getWeakText(team);

  let html=`<div class="card">
  <b>構築タイプ：${type}</b><br>
  <b>勝ち筋：${win}</b><br>
  <b>エース：${ace.ace}</b><br>
  <small>${ace.reason}</small><br>
  <b style="color:red">負け筋：${weak}</b><br><br>`;

  team.forEach(p=>{
    html+=`<div class="poke" onclick="showDetail('${p}')">${p}</div>`;
  });

  html+=`</div>`;

  document.getElementById("out").innerHTML=html;
  renderHistory();
}

/* ===== 詳細 ===== */
function showDetail(name){
  let b=BUILD[base(name)];
  if(!b){
    document.getElementById("modalContent").innerHTML=`${name}<br>データなし`;
  }else{
    document.getElementById("modalContent").innerHTML=
    `${name}<br>
    性格：${getNatureText(b.nature)}<br>
    特性：${b.ability}<br>
    努力値：${convertEV(b.ev)}<br>
    技：${b.moves.join("/")}`;
  }
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>
</body>
</html>
