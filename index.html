<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#ff0000;
  color:white;
}

.poke{padding:8px;border-bottom:1px solid #eee;}
</style>
</head>

<body>

<header>構築AI 完全版</header>

<div class="card">
メガ数
<select id="megaCount">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<button onclick="gen()">構築生成</button>
</div>

<div id="out"></div>

<script>

/* ===== データ（軽量版：動作確認済み） ===== */
const ALL_POKEMON = [
"ガブリアス","カイリュー","ドラパルト","ミミッキュ",
"ドドゲザン","サザンドラ","ウルガモス","ゲンガー",
"ドヒドイデ","アーマーガア","カバルドン",
"ロトム","エルフーン",
"ペリッパー","バンギラス","ギャラドス","ルカリオ"
];

const ALL_MEGA = [
"メガガルーラ","メガゲンガー","メガハッサム",
"メガギャラドス","メガバンギラス",
"メガルカリオ","メガサーナイト",
"メガフシギバナ","メガリザードンX","メガリザードンY","メガカメックス"
];

/* ===== 実在メガだけ ===== */
const REAL_MEGA = new Set(ALL_MEGA);

/* ===== Tier ===== */
const TIER = {
"ガブリアス":5,"カイリュー":5,"ドラパルト":5,
"ミミッキュ":4,"ドドゲザン":4,"サザンドラ":4
};

/* ===== 役割 ===== */
const ROLE = {

"ガブリアス":["physical","sweeper"],
"カイリュー":["physical","setup"],
"ドドゲザン":["physical","sweeper"],
"ミミッキュ":["physical","setup"],

"ドラパルト":["special","sweeper"],
"サザンドラ":["special","breaker"],
"ウルガモス":["special","setup"],

"ドヒドイデ":["wall","cycle"],
"アーマーガア":["wall","cycle"],
"カバルドン":["wall","weather"],

"ロトム":["cycle","pivot"],
"エルフーン":["support"],

"ペリッパー":["weather"],
"バンギラス":["weather"],

"ゲンガー":["offense"],
"ルカリオ":["offense"],
"ギャラドス":["setup"]
};

function base(p){return p.replace("メガ","");}

/* ===== 軽量プール ===== */
function getPool(){

  if(ALL_POKEMON.length === 0){
    alert("データが空です");
    return [];
  }

  let strong = ALL_POKEMON.filter(p => (TIER[p]||1)>=3);

  let random = [...ALL_POKEMON]
    .sort(()=>0.5-Math.random())
    .slice(0,10);

  return [...new Set([...strong,...random])];
}

/* ===== スコア ===== */
function calcScore(team,c){

  let score = TIER[base(c)] || 1;

  team.forEach(()=> score += 1);

  return score;
}

/* ===== 選出 ===== */
function pickBest(team,pool){

  let sample = pool.sort(()=>0.5-Math.random()).slice(0,5);

  let best=null,bestScore=-999;

  sample.forEach(p=>{
    if(team.includes(p)) return;

    let s = calcScore(team,p);

    if(s>bestScore){
      bestScore=s;
      best=p;
    }
  });

  return best;
}

/* ===== メガ ===== */
function pickMega(n){

  let pool = ALL_MEGA.filter(p => REAL_MEGA.has(p));

  pool = pool.sort(()=>0.5-Math.random());

  return pool.slice(0,n);
}

/* ===== 構築タイプ ===== */
function detectBuildType(team){

  let score={
    "スタン":1,
    "サイクル":0,
    "対面":0,
    "天候":0,
    "受け":0
  };

  team.forEach(p=>{
    let r = ROLE[base(p)]||[];

    if(r.includes("wall")) score["受け"]+=2;
    if(r.includes("cycle")) score["サイクル"]+=2;
    if(r.includes("pivot")) score["サイクル"]+=1;

    if(r.includes("offense")) score["対面"]+=2;
    if(r.includes("sweeper")) score["対面"]+=1;

    if(r.includes("weather")) score["天候"]+=3;
  });

  return Object.keys(score).reduce((a,b)=> score[a]>score[b]?a:b);
}

/* ===== 生成 ===== */
function gen(){

  let team=[];

  let megaCount=parseInt(document.getElementById("megaCount").value);

  team = team.concat(pickMega(megaCount));

  let pool = getPool();

  while(team.length<6){
    let p = pickBest(team,pool);
    if(!p) break;
    team.push(p);
  }

  render(team);
}

/* ===== 表示 ===== */
function render(team){

  let type = detectBuildType(team);

  let html = `<div class="card">
  <b>構築タイプ：${type}</b><br><br>`;

  team.forEach(p=>{
    html += `<div class="poke">${p}</div>`;
  });

  html += `</div>`;

  document.getElementById("out").innerHTML = html;
}

</script>
</body>
</html>
