<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{background:white;margin:10px;padding:12px;border-radius:12px;}

button{
width:100%;padding:10px;margin-top:10px;
border:none;border-radius:8px;background:#ff0000;color:white;
}

.poke{
padding:10px;border-bottom:1px solid #eee;
cursor:pointer;
}

.modal{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.modal-inner{
background:white;margin:20% auto;padding:20px;
width:85%;border-radius:12px;
}
</style>
</head>

<body>

<header>構築AI 完全版</header>

<div class="card">

お気に入りポケモン
<select id="fav"></select>

<br><br>

メガ数
<select id="megaCount">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<button onclick="generate()">構築生成</button>
</div>

<div id="out"></div>

<div class="card">
<b>履歴</b>
<div id="history"></div>
</div>

<div id="modal" class="modal">
<div class="modal-inner">
<div id="modalText"></div>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>

/* =========================
   データ
========================= */

const POKEMON = [
"ガブリアス","カイリュー","ドラパルト","ミミッキュ",
"ドドゲザン","サザンドラ","ウルガモス","ゲンガー",
"アーマーガア","カバルドン","ルカリオ","ギャラドス"
];

const MEGA = [
"メガガブリアス","メガサーナイト",
"メガルカリオ","メガゲンガー","メガギャラドス"
];

const TYPE = {
"ガブリアス":["ドラゴン","じめん"],
"カイリュー":["ドラゴン","ひこう"],
"ドラパルト":["ゴースト","ドラゴン"],
"ミミッキュ":["ゴースト","フェアリー"],
"ドドゲザン":["あく","はがね"],
"サザンドラ":["あく","ドラゴン"],
"ウルガモス":["ほのお","むし"],
"ゲンガー":["ゴースト","どく"],
"アーマーガア":["ひこう","はがね"],
"カバルドン":["じめん"],
"ルカリオ":["かくとう","はがね"],
"ギャラドス":["みず","ひこう"]
};

const ITEMS = [
{n:"きあいのタスキ",t:["sweeper"]},
{n:"こだわりスカーフ",t:["fast"]},
{n:"たべのこし",t:["wall"]},
{n:"オボンのみ",t:["wall"]},
{n:"ラムのみ",t:["all"]}
];

let historyData = [];

/* =========================
   初期化
========================= */

function init(){
let s=document.getElementById("fav");
s.innerHTML="<option value=''>なし</option>";
POKEMON.forEach(p=>{
let o=document.createElement("option");
o.value=p;o.textContent=p;
s.appendChild(o);
});
}
init();

/* =========================
   メガ
========================= */

function pickMega(n){
return [...MEGA].sort(()=>0.5-Math.random()).slice(0,n);
}

/* =========================
   弱点チェック（簡易）
========================= */

function weakCheck(team){

let weak={"でんき":0,"じめん":0,"こおり":0};

team.forEach(p=>{
let t=TYPE[p]||[];
if(t.includes("みず")||t.includes("ひこう")) weak["でんき"]+=2;
if(t.includes("はがね")) weak["じめん"]+=1;
if(t.includes("ドラゴン")) weak["こおり"]+=1;
});

return Object.entries(weak)
.sort((a,b)=>b[1]-a[1])
.slice(0,2)
.map(x=>x[0]);
}

/* =========================
   持ち物AI（重複なし）
========================= */

function assignItem(p, used){

let role="all";
if(p==="ミミッキュ"||p==="ガブリアス") role="sweeper";
if(p==="カバルドン"||p==="アーマーガア") role="wall";

let candidates = ITEMS.map(i=>{
let s=0;

if(i.t.includes(role)) s+=3;
if(i.t.includes("all")) s+=1;
if(used.includes(i.n)) s-=100;

return {name:i.n,score:s};
});

candidates.sort((a,b)=>b.score-a.score);

let chosen = candidates[0].name;
used.push(chosen);

return chosen;
}

/* =========================
   スコア
========================= */

function score(p,team){

let t=TYPE[p]||[];
let s=0;

/* タイプ被り軽減 */
team.forEach(x=>{
let tx=TYPE[x]||[];
if(tx.some(a=>t.includes(a))) s-=2;
});

/* 弱点補完 */
let weak=weakCheck(team);
if(weak.some(w=>t.includes(w))) s+=3;

return s;
}

/* =========================
   構築生成
========================= */

function generate(){

let team=[];

/* メガ */
let megaCount=parseInt(document.getElementById("megaCount").value);
team = team.concat(pickMega(megaCount));

/* お気に入り */
let fav=document.getElementById("fav").value;
if(fav && !team.includes(fav)) team.push(fav);

/* 残り */
while(team.length<6){

let pool=POKEMON.filter(p=>!team.includes(p));

let best=null,bestScore=-999;

pool.forEach(p=>{
let s=score(p,team);
if(s>bestScore){
bestScore=s;
best=p;
}
});

team.push(best);
}

/* 履歴保存 */
historyData.unshift(team);

/* 表示 */
render(team);
renderHistory();
}

/* =========================
   表示
========================= */

function render(team){

let weak=weakCheck(team);
let used=[];

let html=`<div class="card">
<b>弱点：</b>${weak.join(" / ")}<br><br>`;

team.forEach(p=>{
let item=assignItem(p,used);

html+=`
<div class="poke" onclick="detail('${p}','${item}')">
${p}（${item}）
</div>`;
});

html+="</div>";

document.getElementById("out").innerHTML=html;
}

/* =========================
   履歴
========================= */

function renderHistory(){

let html="";

historyData.slice(0,10).forEach((team,i)=>{
html+=`
<div class="poke" onclick='loadHistory(${i})'>
構築${i+1}
</div>`;
});

document.getElementById("history").innerHTML=html;
}

function loadHistory(i){
render(historyData[i]);
}

/* =========================
   モーダル
========================= */

function detail(p,item){
document.getElementById("modalText").innerHTML=
`<b>${p}</b><br>持ち物：${item}`;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
