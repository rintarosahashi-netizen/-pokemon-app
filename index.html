<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{background:white;margin:10px;padding:12px;border-radius:12px;}

button{
width:100%;padding:10px;margin-top:10px;
border:none;border-radius:8px;background:#ff0000;color:white;
}

.poke{
padding:10px;border-bottom:1px solid #eee;
cursor:pointer;
}

.bad{color:#c00;font-weight:bold;}
.good{color:#090;font-weight:bold;}

.modal{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

.modal-inner{
background:white;margin:15% auto;padding:20px;
width:85%;border-radius:12px;
}
</style>
</head>

<body>

<header>構築AI（完全版）</header>

<div class="card">
使いたいポケモン
<select id="fav"></select>

<button onclick="generate()">構築生成</button>
</div>

<div id="out"></div>

<div id="modal" class="modal">
<div class="modal-inner">
<div id="modalText"></div>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>

/* =========================
   🧠 データ
========================= */

const POKEMON = [
"ガブリアス","カイリュー","ドラパルト","ミミッキュ",
"ドドゲザン","サザンドラ","ウルガモス","ゲンガー",
"アーマーガア","カバルドン","ルカリオ","ギャラドス"
];

const TYPE = {
"ガブリアス":["ドラゴン","じめん"],
"カイリュー":["ドラゴン","ひこう"],
"ドラパルト":["ゴースト","ドラゴン"],
"ミミッキュ":["ゴースト","フェアリー"],
"ドドゲザン":["あく","はがね"],
"サザンドラ":["あく","ドラゴン"],
"ウルガモス":["ほのお","むし"],
"ゲンガー":["ゴースト","どく"],
"アーマーガア":["ひこう","はがね"],
"カバルドン":["じめん"],
"ルカリオ":["かくとう","はがね"],
"ギャラドス":["みず","ひこう"]
};

/* =========================
   🧠 持ち物AI（簡略版）
========================= */

const ITEMS = [
{n:"きあいのタスキ",t:["fast","sweeper"],p:100},
{n:"こだわりスカーフ",t:["fast"],p:90},
{n:"たべのこし",t:["wall"],p:85},
{n:"オボンのみ",t:["wall","tank"],p:80},
{n:"ラムのみ",t:["all"],p:70}
];

/* =========================
   初期化
========================= */

function init(){
let s=document.getElementById("fav");
s.innerHTML="<option value=''>なし</option>";
POKEMON.forEach(p=>{
let o=document.createElement("option");
o.value=p;o.textContent=p;
s.appendChild(o);
});
}
init();

/* =========================
   弱点判定（超簡易）
========================= */

function weakCheck(team){

let weak={"でんき":0,"じめん":0,"こおり":0};

team.forEach(p=>{
let t=TYPE[p]||[];
if(t.includes("みず")) weak["でんき"]+=2;
if(t.includes("ひこう")) weak["でんき"]+=2;
if(t.includes("はがね")) weak["じめん"]+=1;
if(t.includes("ドラゴン")) weak["こおり"]+=1;
});

return Object.entries(weak)
.sort((a,b)=>b[1]-a[1])
.slice(0,2)
.map(x=>x[0]);
}

/* =========================
   持ち物AI
========================= */

function assignItem(p){

let role="";

let t=TYPE[p]||[];

if(p==="ミミッキュ"||p==="ガブリアス") role="sweeper";
else if(p==="カバルドン"||p==="アーマーガア") role="wall";
else role="all";

let best=ITEMS[0];
let bestScore=-1;

ITEMS.forEach(i=>{
let s=0;
if(i.t.includes(role)) s+=3;
if(i.t.includes("all")) s+=1;
if(s>bestScore){
bestScore=s;
best=i;
}
});

return best.n;
}

/* =========================
   スコア
========================= */

function score(p,team){

let t=TYPE[p]||[];
let s=0;

team.forEach(x=>{
let tx=TYPE[x]||[];
if(tx.some(a=>t.includes(a))) s-=2;
});

let w=weakCheck(team);
if(w.some(x=>t.includes(x))) s+=3;

return s;
}

/* =========================
   構築生成（コア）
========================= */

function generate(){

let team=[];

let fav=document.getElementById("fav").value;
if(fav) team.push(fav);

while(team.length<6){

let pool=POKEMON.filter(p=>!team.includes(p));

let best=null;
let bestScore=-999;

pool.forEach(p=>{
let s=score(p,team);
if(s>bestScore){
bestScore=s;
best=p;
}
});

team.push(best);
}

render(team);
}

/* =========================
   表示
========================= */

function render(team){

let weak=weakCheck(team);

let html=`<div class="card">
<b>弱点：</b>${weak.join(" / ")}<br><br>`;

team.forEach(p=>{
let item=assignItem(p);

html+=`
<div class="poke" onclick="detail('${p}','${item}')">
${p}（${item}）
</div>`;
});

html+="</div>";

document.getElementById("out").innerHTML=html;
}

/* =========================
   詳細モーダル
========================= */

function detail(p,item){

document.getElementById("modalText").innerHTML=
`<b>${p}</b><br>持ち物：${item}`;

document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
