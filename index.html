<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI（レギュ対応）</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{
  background:white;
  margin:10px auto;
  padding:12px;
  border-radius:14px;
  max-width:500px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff0000;
  color:white;
}

select{
  width:100%;
  padding:10px;
  margin-top:8px;
}

.poke{padding:10px;border-bottom:1px solid #eee;}

.type{
  font-size:12px;
  padding:3px 6px;
  border-radius:6px;
  color:white;
  margin-right:4px;
}
</style>
</head>

<body>

<header>構築AI（レギュ対応）</header>

<div class="card">
  レギュレーション
  <select id="reg"></select>

  メガ数
  <select id="megaCount">
    <option value="0">なし</option>
    <option value="1">1体</option>
    <option value="2">2体</option>
  </select>

  <button onclick="gen()">構築生成</button>
</div>

<div id="out"></div>

<script>

/* ===== レギュ ===== */
const REGULATIONS = {

  "メガ環境":{
    allowMega:true,
    pokemon:["ミミッキュ","ドラパルト","ドドゲザン","ドヒドイデ","ガブリアス"],
    mega:["メガガブリアス","メガサーナイト"]
  },

  "通常環境":{
    allowMega:false,
    pokemon:["ミミッキュ","ドラパルト","ドドゲザン","ドヒドイデ"],
    mega:[]
  }

};

/* ===== 図鑑 ===== */
const POKEDEX = {
  "ミミッキュ":{type:["ゴースト","フェアリー"]},
  "ドラパルト":{type:["ドラゴン","ゴースト"]},
  "ドドゲザン":{type:["あく","はがね"]},
  "ドヒドイデ":{type:["みず","どく"]},
  "ガブリアス":{type:["ドラゴン","じめん"]},
  "サーナイト":{type:["フェアリー"]}
};

/* ===== 初期化 ===== */
const regSelect = document.getElementById("reg");

Object.keys(REGULATIONS).forEach(r=>{
  regSelect.innerHTML += `<option>${r}</option>`;
});

/* ===== 補助 ===== */
function base(p){ return p.replace("メガ",""); }

/* ===== 生成 ===== */
function gen(){

  let regName = regSelect.value;
  let reg = REGULATIONS[regName];

  let megaCount = parseInt(document.getElementById("megaCount").value);

  let team = [];

  /* メガ */
  if(reg.allowMega){
    for(let i=0;i<megaCount;i++){
      let m = reg.mega[Math.floor(Math.random()*reg.mega.length)];
      team.push(m);
    }
  }

  /* 通常 */
  while(team.length<6){
    let p = reg.pokemon[Math.floor(Math.random()*reg.pokemon.length)];

    if(!team.some(x=>base(x)===base(p))){
      team.push(p);
    }
  }

  render(team);
}

/* ===== 表示 ===== */
function render(team){

  let html = `<div class="card">`;

  team.forEach(p=>{
    let data = POKEDEX[base(p)] || {type:["不明"]};

    html += `<div class="poke">${p}<br>`;

    data.type.forEach(t=>{
      html += `<span class="type">${t}</span>`;
    });

    html += `</div>`;
  });

  html += `</div>`;

  document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
