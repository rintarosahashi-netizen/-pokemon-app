<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ポケモン構築AI</title>

<link rel="apple-touch-icon" href="icon.png.PNG">

<style>

/* ===== 基本 ===== */
body {
  margin:0;
  font-family:-apple-system;
  background:#eef1ff;
}

/* ===== ホーム ===== */
#home {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#3b4cca,#ff0000);
  color:white;
}

.home-btn {
  width:80%;
  padding:15px;
  margin:10px;
  border-radius:15px;
  border:none;
  font-size:16px;
  font-weight:bold;
}

/* ===== ヘッダー ===== */
header {
  background:#3b4cca;
  color:white;
  padding:12px;
  text-align:center;
}

/* ===== カード ===== */
.card {
  background:white;
  margin:10px;
  padding:12px;
  border-radius:15px;
}

/* ===== ボタン ===== */
button {
  width:100%;
  padding:10px;
  background:#ff0000;
  color:white;
  border:none;
  border-radius:10px;
}

/* ===== ポケモンカード ===== */
.poke {
  padding:10px;
  border-bottom:1px solid #eee;
}

.name {
  font-weight:bold;
}

/* タイプ */
.type {
  font-size:12px;
  padding:3px 6px;
  border-radius:6px;
  color:white;
  margin-right:5px;
}

.みず{background:#6890f0;}
.ほのお{background:#f08030;}
.くさ{background:#78c850;}
.ゴースト{background:#705898;}
.あく{background:#705848;}
.フェアリー{background:#ee99ac;}
.ドラゴン{background:#7038f8;}

.hidden{display:none;}

</style>
</head>

<body>

<!-- ===== HOME ===== -->
<div id="home">
  <h2>ポケモン構築AI</h2>
  <button class="home-btn" onclick="openApp()">構築を作る</button>
  <button class="home-btn" onclick="showSettings()">設定</button>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">

<header>構築生成</header>

<div class="card">
  <input id="input" placeholder="使いたいポケモン">
  <select id="megaCount">
    <option value="1">メガ1体</option>
    <option value="2">メガ2体</option>
  </select>

  <button onclick="gen()">生成</button>
</div>

<div id="out"></div>

</div>

<!-- ===== SETTINGS ===== -->
<div id="settings" class="hidden">
<header>設定</header>

<div class="card">
  レギュレーション
  <input id="reg" placeholder="例：ランクマ / フリー">

  強さ
  <select id="level">
    <option>初心者</option>
    <option>中級者</option>
    <option>上級者</option>
  </select>

  天候
  <select id="weather">
    <option>なし</option>
    <option>雨</option>
    <option>晴れ</option>
    <option>砂</option>
  </select>

</div>

<button onclick="backHome()">戻る</button>
</div>

<script>

/* ===== データ ===== */
const pool = [
  "ミミッキュ",
  "ドラパルト",
  "ドドゲザン",
  "ドヒドイデ",
  "ガブリアス",
  "サーナイト"
];

const types = {
  "ミミッキュ":["ゴースト","フェアリー"],
  "ドラパルト":["ドラゴン","ゴースト"],
  "ドドゲザン":["あく"],
  "ドヒドイデ":["みず","どく"],
  "ガブリアス":["ドラゴン","じめん"],
  "サーナイト":["フェアリー"]
};

const megaPool = ["メガガブリアス","メガサーナイト"];

/* ===== 画面 ===== */
function openApp(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

function showSettings(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("settings").classList.remove("hidden");
}

function backHome(){
  document.getElementById("settings").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

/* ===== 構築生成 ===== */
function gen(){

  let team = [];

  let megaCount = parseInt(document.getElementById("megaCount").value);
  let input = document.getElementById("input").value;

  /* メガ */
  for(let i=0;i<megaCount;i++){
    team.push(megaPool[Math.floor(Math.random()*megaPool.length)]);
  }

  if(input) team.push(input);

  /* 偏り防止ランダム */
  while(team.length<6){
    let p = pool[Math.floor(Math.random()*pool.length)];
    if(!team.includes(p)) team.push(p);
  }

  /* 表示 */
  let html = `<div class="card">`;

  team.forEach(p=>{
    let t = types[p] || ["不明"];

    html += `<div class="poke">
      <div class="name">${p}</div>`;

    t.forEach(tp=>{
      html += `<span class="type ${tp}">${tp}</span>`;
    });

    html += `</div>`;
  });

  html += `</div>`;

  document.getElementById("out").innerHTML = html;
}

</script>

</body>
</html>
