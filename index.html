<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{
  background:white;
  margin:10px auto;
  padding:12px;
  border-radius:14px;
  max-width:500px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff0000;
  color:white;
}

textarea{width:100%;height:100px;margin-top:8px;}

.poke{padding:10px;border-bottom:1px solid #eee;cursor:pointer;}

.type{
  font-size:12px;
  padding:3px 6px;
  border-radius:6px;
  color:white;
  margin-right:4px;
}

.ゴースト{background:#705898;}
.フェアリー{background:#ee99ac;}
.ドラゴン{background:#7038f8;}
.あく{background:#705848;}
.はがね{background:#b8b8d0;}
.みず{background:#6890f0;}
.どく{background:#a040a0;}
</style>
</head>

<body>

<header>構築AI 完全版</header>

<div class="card">
<b>① 内定ポケモン貼り付け</b>
<textarea id="importBox"></textarea>
<button onclick="importPokemon()">取り込み</button>
</div>

<div class="card">
メガ数
<select id="megaCount">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<button onclick="gen()">構築生成</button>
<button onclick="clearHistory()">履歴クリア</button>
</div>

<div id="out"></div>
<div id="detail"></div>
<div id="history"></div>

<script>

/* ===== データ ===== */
let ALL_POKEMON = [];
let ALL_MEGA = [];

const POKEDEX = {
"ミミッキュ":{type:["ゴースト","フェアリー"]},
"ドラパルト":{type:["ドラゴン","ゴースト"]},
"ドドゲザン":{type:["あく","はがね"]},
"ドヒドイデ":{type:["みず","どく"]},
"ガブリアス":{type:["ドラゴン","じめん"]},
"サーナイト":{type:["フェアリー"]},
"カイリュー":{type:["ドラゴン","ひこう"]},
"バンギラス":{type:["いわ","あく"]}
};

/* ===== Tier ===== */
const TIER = {
"ガブリアス":5,
"ミミッキュ":4,
"ドラパルト":5
};

/* ===== 弱点 ===== */
const WEAK = {
"ドラゴン":["こおり","フェアリー"],
"あく":["かくとう"],
"はがね":["ほのお"]
};

function base(p){return p.replace("メガ","");}

/* ===== インポート ===== */
function importPokemon(){

  let text=document.getElementById("importBox").value;

  let raw=text.split(/\s|\n|,/);

  let normal=[],mega=[];

  raw.forEach(p=>{
    p=p.trim();
    if(!p)return;

    if(p.includes("メガ")) mega.push(p);
    else normal.push(p);
  });

  ALL_POKEMON=[...new Set(normal)];
  ALL_MEGA=[...new Set(mega)];

  alert("通常:"+ALL_POKEMON.length+" メガ:"+ALL_MEGA.length);
}

/* ===== スコア ===== */
function calcScore(team,c){

  let score=0;
  let ct=POKEDEX[base(c)]?.type||[];

  team.forEach(p=>{
    let tt=POKEDEX[base(p)]?.type||[];

    ct.forEach(x=>{
      if(tt.includes(x)) score-=2;
    });

    ct.forEach(x=>{
      let w=WEAK[x]||[];
      tt.forEach(y=>{
        if(w.includes(y)) score--;
      });
    });

    score++;
  });

  score += TIER[base(c)] || 1;

  return score;
}

/* ===== 最適選択 ===== */
function pickBest(team,pool){

  let best=null,bestScore=-999;

  pool.forEach(p=>{
    if(team.some(x=>base(x)===base(p)))return;

    let s=calcScore(team,p);

    if(s>bestScore){
      bestScore=s;
      best=p;
    }
  });

  return best;
}

/* ===== メガ ===== */
function pickMega(count){

  let pool=[...ALL_MEGA];
  let res=[];

  while(res.length<count && pool.length){
    let i=Math.floor(Math.random()*pool.length);
    res.push(pool[i]);
    pool.splice(i,1);
  }

  return res;
}

/* ===== 生成 ===== */
function gen(){

  if(ALL_POKEMON.length===0){
    alert("先にポケモンを取り込んでください");
    return;
  }

  let team=[];

  let megaCount=parseInt(document.getElementById("megaCount").value);

  team=team.concat(pickMega(megaCount));

  while(team.length<6){
    let p=pickBest(team,ALL_POKEMON);
    if(!p)break;
    team.push(p);
  }

  render(team);
  saveHistory(team);
}

/* ===== 表示 ===== */
function render(team){

  let html=`<div class="card">`;

  team.forEach(p=>{
    let t=POKEDEX[base(p)]?.type||[];

    html+=`<div class="poke" onclick="detail('${p}')">${p}<br>`;

    t.forEach(x=>{
      html+=`<span class="type ${x}">${x}</span>`;
    });

    html+=`</div>`;
  });

  html+=`</div>`;

  document.getElementById("out").innerHTML=html;
}

/* ===== 詳細 ===== */
function detail(p){
  document.getElementById("detail").innerHTML=
  `<div class="card">${p}<br>詳細追加予定</div>`;
}

/* ===== 履歴 ===== */
function saveHistory(team){
  let h=JSON.parse(localStorage.getItem("h")||"[]");
  h.unshift(team);
  h=h.slice(0,10);
  localStorage.setItem("h",JSON.stringify(h));
  renderHistory();
}

function renderHistory(){
  let h=JSON.parse(localStorage.getItem("h")||"[]");

  let html=`<div class="card"><b>履歴</b>`;

  h.forEach((t,i)=>{
    html+=`<div>#${i+1}: ${t.join(", ")}</div>`;
  });

  html+=`</div>`;

  document.getElementById("history").innerHTML=html;
}

function clearHistory(){
  localStorage.removeItem("h");
  renderHistory();
}

renderHistory();

</script>
</body>
</html>
