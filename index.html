<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{background:white;margin:10px;padding:12px;border-radius:12px;}

button{
width:100%;padding:10px;margin-top:10px;
border:none;border-radius:8px;background:#ff0000;color:white;
}

.poke{padding:10px;border-bottom:1px solid #eee;cursor:pointer;}

.history-card{
background:white;margin-top:8px;padding:8px;
border-radius:10px;border:1px solid #ddd;font-size:12px;
}

#modal{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:rgba(0,0,0,0.6);
}
.modal-inner{
background:white;margin:20% auto;padding:20px;
width:85%;border-radius:12px;
}
</style>
</head>

<body>

<header>構築AI 完全版</header>

<div class="card">
使いたいポケモン
<select id="favPokemon"></select>

<button onclick="gen()">構築生成</button>
</div>

<div id="out"></div>
<div id="history" class="card"></div>

<div id="modal">
<div class="modal-inner">
<div id="modalContent"></div>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>

/* ===== データ ===== */
const ALL_POKEMON = [
"ガブリアス","カイリュー","ドラパルト","ミミッキュ",
"ドドゲザン","サザンドラ","ウルガモス","ゲンガー",
"ドヒドイデ","アーマーガア","カバルドン",
"ロトム","エルフーン","バンギラス","ギャラドス","ルカリオ"
];

const TYPE = {
"ガブリアス":["ドラゴン","じめん"],
"カイリュー":["ドラゴン","ひこう"],
"ドラパルト":["ドラゴン","ゴースト"],
"ミミッキュ":["ゴースト","フェアリー"],
"ドドゲザン":["あく","はがね"],
"サザンドラ":["あく","ドラゴン"],
"ウルガモス":["むし","ほのお"],
"ゲンガー":["ゴースト","どく"],
"ドヒドイデ":["みず","どく"],
"アーマーガア":["ひこう","はがね"],
"カバルドン":["じめん"],
"ロトム":["でんき","ゴースト"],
"エルフーン":["くさ","フェアリー"],
"バンギラス":["いわ","あく"],
"ギャラドス":["みず","ひこう"],
"ルカリオ":["かくとう","はがね"]
};

/* ===== UI初期化 ===== */
function initSelect(){
let s=document.getElementById("favPokemon");
s.innerHTML="<option value=''>なし</option>";
ALL_POKEMON.forEach(p=>{
let o=document.createElement("option");
o.value=p;o.textContent=p;
s.appendChild(o);
});
}
initSelect();

/* ===== 持ち物 ===== */
const ITEMS=["タスキ","珠","残飯","スカーフ","ラム"];

/* ===== 育成自動生成 ===== */
function autoBuild(p){

let types=TYPE[p]||[];

let physical=Math.random()>0.5;

let nature=physical?"いじっぱり":"おくびょう";
let ev=physical?"A252 S252":"C252 S252";

let moves=[];

if(types.includes("じめん")) moves.push("じしん");
if(types.includes("ドラゴン")) moves.push("りゅうせいぐん");
if(types.includes("ゴースト")) moves.push("シャドーボール");
if(types.includes("あく")) moves.push("あくのはどう");
if(types.includes("ほのお")) moves.push("かえんほうしゃ");
if(types.includes("みず")) moves.push("なみのり");
if(types.includes("でんき")) moves.push("10まんボルト");

while(moves.length<4){
moves.push(["まもる","みがわり","つるぎのまい"][Math.floor(Math.random()*3)]);
}

return {
nature,
ability:"特性",
ev,
moves
};
}

/* ===== 弱点 ===== */
const TYPE_CHART={
"でんき":{"みず":2,"ひこう":2,"じめん":0},
"こおり":{"ドラゴン":2,"ひこう":2,"じめん":2},
"じめん":{"でんき":2,"ほのお":2},
};

function getMultiplier(atk,def){
let m=1;
def.forEach(d=>{
let v=(TYPE_CHART[atk]||{})[d];
if(v===0)m*=0;
else if(v)m*=v;
});
return m;
}

function getWeakText(team){
let score={};

Object.keys(TYPE_CHART).forEach(t=>{
let s=0;
team.forEach(p=>{
let m=getMultiplier(t,TYPE[p]||[]);
if(m>=2)s++;
if(m===0)s--;
});
score[t]=s;
});

return Object.entries(score)
.sort((a,b)=>b[1]-a[1])
.slice(0,2)
.map(x=>x[0]).join(" / ");
}

/* ===== 構築 ===== */
function gen(){

let team=[];

let fav=document.getElementById("favPokemon").value;
if(fav) team.push(fav);

while(team.length<6){
let p=ALL_POKEMON[Math.floor(Math.random()*ALL_POKEMON.length)];
if(!team.includes(p)) team.push(p);
}

team=team.map(p=>({
name:p,
item:ITEMS[Math.floor(Math.random()*ITEMS.length)],
build:autoBuild(p)
}));

saveHistory(team);
render(team);
}

/* ===== 表示 ===== */
function render(team){

let names=team.map(t=>t.name);

let html=`<div class="card">
<b>負け筋：</b>${getWeakText(names)}<br><br>`;

team.forEach(p=>{
html+=`<div class="poke" onclick="showDetail('${p.name}')">
${p.name}（${p.item}）
</div>`;
});

html+=`</div>`;

document.getElementById("out").innerHTML=html;
renderHistory();
}

/* ===== 詳細 ===== */
function showDetail(name){

let t=HISTORY[0].team.find(x=>x.name===name);

let b=t.build;

document.getElementById("modalContent").innerHTML=`
<b>${name}</b><br>
持ち物：${t.item}<br>
性格：${b.nature}<br>
努力値：${b.ev}<br>
技：${b.moves.join(" / ")}
`;

document.getElementById("modal").style.display="block";
}

/* ===== 履歴 ===== */
let HISTORY=[];

function saveHistory(team){
HISTORY.unshift({team,date:new Date().toLocaleTimeString()});
if(HISTORY.length>10)HISTORY.pop();
}

function renderHistory(){

let html="<b>履歴</b>";

HISTORY.forEach((h,i)=>{
let short=h.team.map(t=>t.name).slice(0,3).join("・");

html+=`
<div class="history-card" onclick="openHistoryModal(${i})">
#${i+1} ${short}
</div>`;
});

document.getElementById("history").innerHTML=html;
}

function openHistoryModal(i){

let team=HISTORY[i].team;

let html="<b>構築詳細</b><br><hr>";

team.forEach(p=>{
html+=`${p.name}（${p.item}）<br>`;
});

document.getElementById("modalContent").innerHTML=html;
document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>
</body>
</html>
