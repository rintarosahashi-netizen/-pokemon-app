<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#ff0000;
  color:white;
}

.poke{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* 履歴 */
.history-card{
  background:white;
  margin-top:8px;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:12px;
}

/* モーダル */
#modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-inner{
  background:white;
  margin:20% auto;
  padding:20px;
  width:85%;
  border-radius:12px;
}
</style>
</head>

<body>

<header>構築AI 完全版</header>

<div class="card">
メガ数
<select id="megaCount">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<button onclick="gen()">構築生成</button>
</div>

<div id="out"></div>
<div id="history" class="card"></div>

<!-- モーダル -->
<div id="modal">
  <div class="modal-inner">
    <div id="modalContent"></div>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>

/* ===== ポケモン ===== */
const ALL_POKEMON = [
"ガブリアス","カイリュー","ドラパルト","ミミッキュ",
"ドドゲザン","サザンドラ","ウルガモス","ゲンガー",
"ドヒドイデ","アーマーガア","カバルドン",
"ロトム","エルフーン",
"ペリッパー","バンギラス","ギャラドス","ルカリオ"
];

/* ===== タイプ ===== */
const TYPE = {
"ガブリアス":["ドラゴン","じめん"],
"カイリュー":["ドラゴン","ひこう"],
"ドラパルト":["ドラゴン","ゴースト"],
"ミミッキュ":["ゴースト","フェアリー"],
"ドドゲザン":["あく","はがね"],
"サザンドラ":["あく","ドラゴン"],
"ウルガモス":["むし","ほのお"],
"ゲンガー":["ゴースト","どく"],
"ドヒドイデ":["みず","どく"],
"アーマーガア":["ひこう","はがね"],
"カバルドン":["じめん"],
"ロトム":["でんき","ゴースト"],
"エルフーン":["くさ","フェアリー"],
"ペリッパー":["みず","ひこう"],
"バンギラス":["いわ","あく"],
"ギャラドス":["みず","ひこう"],
"ルカリオ":["かくとう","はがね"]
};

/* ===== 持ち物 ===== */
const ITEMS = [
"きあいのタスキ","いのちのたま","たべのこし",
"オボンのみ","こだわりスカーフ","ラムのみ"
];

/* ===== 相性（倍率＋半減＋無効） ===== */
const TYPE_CHART = {
"でんき":{"みず":2,"ひこう":2,"じめん":0},
"こおり":{"ドラゴン":2,"ひこう":2,"じめん":2,"くさ":2},
"じめん":{"でんき":2,"ほのお":2,"はがね":2,"ひこう":0},
"かくとう":{"あく":2,"はがね":2,"いわ":2,"ノーマル":2,"ゴースト":0},
"ゴースト":{"ゴースト":2,"エスパー":2,"ノーマル":0},
"ドラゴン":{"ドラゴン":2,"フェアリー":0},
"フェアリー":{"ドラゴン":2,"あく":2,"かくとう":2}
};

/* ===== 共通 ===== */
function base(p){return p.replace("メガ","");}

/* ===== 持ち物決定 ===== */
function getItem(){
  return ITEMS[Math.floor(Math.random()*ITEMS.length)];
}

function attachItems(team){
  return team.map(p=>({name:p,item:getItem()}));
}

/* ===== 倍率 ===== */
function getMultiplier(atk,def){
  let m=1;
  def.forEach(d=>{
    let v=(TYPE_CHART[atk]||{})[d];
    if(v===0) m*=0;
    else if(v) m*=v;
  });
  return m;
}

/* ===== 弱点 ===== */
function detectWeakness(team){
  let result={};

  Object.keys(TYPE_CHART).forEach(atk=>{
    let score=0;

    team.forEach(p=>{
      let m=getMultiplier(atk,TYPE[base(p)]||[]);

      if(m===0) score-=2;
      else if(m>=4) score+=3;
      else if(m>=2) score+=1;
      else if(m<=0.5) score-=1;
    });

    result[atk]=score;
  });

  return Object.entries(result)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,2);
}

function getWeakText(team){
  return detectWeakness(team).map(w=>{
    let lvl=w[1]>=5?"⚠️重い":w[1]>=3?"注意":w[1]<=0?"◎":"";
    return `${w[0]} ${lvl}`;
  }).join(" / ");
}

/* ===== 簡易AI ===== */
function pickBest(team){
  let list=ALL_POKEMON.filter(p=>!team.includes(p));
  return list[Math.floor(Math.random()*list.length)];
}

/* ===== 履歴 ===== */
let HISTORY=[];

function saveHistory(team){
  HISTORY.unshift({
    team:team,
    date:new Date().toLocaleTimeString()
  });
  if(HISTORY.length>10) HISTORY.pop();
}

/* ===== 生成 ===== */
function gen(){
  let team=[];

  while(team.length<6){
    team.push(pickBest(team));
  }

  team=attachItems(team);

  saveHistory(team);
  render(team);
}

/* ===== 表示 ===== */
function render(team){

  let names=team.map(t=>t.name);

  let html=`<div class="card">
  <b>構築タイプ：</b>対面<br>
  <b>勝ち筋：</b>エースで全抜き<br>
  <b>エース：</b>${names[0]}<br>
  <b style="color:red">負け筋：</b>${getWeakText(names)}<br><br>`;

  team.forEach(p=>{
    html+=`<div class="poke" onclick="showDetail('${p.name}','${p.item}')">
      ${p.name}（${p.item}）
    </div>`;
  });

  html+=`</div>`;

  document.getElementById("out").innerHTML=html;
  renderHistory();
}

/* ===== 履歴UI ===== */
function renderHistory(){

  let html="<b>履歴</b>";

  HISTORY.forEach((h,i)=>{
    let names=h.team.map(t=>t.name);
    let short=names.slice(0,3).join("・");

    html+=`
    <div class="history-card" onclick="openHistoryModal(${i})">
      #${i+1} (${h.date})<br>
      ${short} ...
    </div>`;
  });

  document.getElementById("history").innerHTML=html;
}

/* ===== 履歴モーダル ===== */
function openHistoryModal(i){

  let data=HISTORY[i];
  let team=data.team;

  let names=team.map(t=>t.name);

  let html=`
  <b>構築タイプ：</b>対面<br>
  <b>勝ち筋：</b>エースで全抜き<br>
  <b>エース：</b>${names[0]}<br>
  <b style="color:red">負け筋：</b>${getWeakText(names)}<br><br><hr>`;

  team.forEach(p=>{
    html+=`${p.name}（${p.item}）<br>`;
  });

  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").style.display="block";
}

/* ===== 詳細 ===== */
function showDetail(name,item){
  document.getElementById("modalContent").innerHTML=
    `${name}<br>持ち物：${item}`;
  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>
</body>
</html>
