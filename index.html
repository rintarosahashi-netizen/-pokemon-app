<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{
  background:white;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#ff0000;
  color:white;
}

.poke{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* モーダル */
#modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-inner{
  background:white;
  margin:20% auto;
  padding:20px;
  width:85%;
  border-radius:12px;
}
</style>
</head>

<body>

<header>構築AI 完全版</header>

<div class="card">
メガ数
<select id="megaCount">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
</select>

<button onclick="gen()">構築生成</button>
</div>

<div id="out"></div>

<!-- モーダル -->
<div id="modal">
  <div class="modal-inner">
    <div id="modalContent"></div>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>

/* ===== データ ===== */
const ALL_POKEMON = [
"ガブリアス","カイリュー","ドラパルト","ミミッキュ",
"ドドゲザン","サザンドラ","ウルガモス","ゲンガー",
"ドヒドイデ","アーマーガア","カバルドン",
"ロトム","エルフーン",
"ペリッパー","バンギラス","ギャラドス","ルカリオ"
];

const ALL_MEGA = [
"メガガルーラ","メガゲンガー","メガハッサム",
"メガギャラドス","メガバンギラス",
"メガルカリオ","メガサーナイト",
"メガフシギバナ","メガリザードンX","メガリザードンY","メガカメックス"
];

const REAL_MEGA = new Set(ALL_MEGA);

/* ===== Tier ===== */
const TIER = {
"ガブリアス":5,"カイリュー":5,"ドラパルト":5,
"ミミッキュ":4,"ドドゲザン":4,"サザンドラ":4
};

/* ===== 役割 ===== */
const ROLE = {
"ガブリアス":["physical","sweeper"],
"カイリュー":["physical","setup"],
"ドドゲザン":["physical","sweeper"],
"ミミッキュ":["physical","setup"],
"ドラパルト":["special","sweeper"],
"サザンドラ":["special","breaker"],
"ウルガモス":["special","setup"],
"ドヒドイデ":["wall","cycle"],
"アーマーガア":["wall","cycle"],
"カバルドン":["wall","weather"],
"ロトム":["cycle","pivot"],
"エルフーン":["support"],
"ペリッパー":["weather"],
"バンギラス":["weather"],
"ゲンガー":["offense"],
"ルカリオ":["offense"],
"ギャラドス":["setup"]
};

function base(p){return p.replace("メガ","");}

/* ===== 性格 ===== */
const NATURE = {
"ようき": {up:"S",down:"C"},
"いじっぱり": {up:"A",down:"C"},
"ひかえめ": {up:"C",down:"A"},
"おくびょう": {up:"S",down:"A"}
};

function getNatureText(n){
  let d = NATURE[n];
  if(!d) return n;
  return `${n}（${d.up}↑ ${d.down}↓）`;
}

/* ===== 努力値変換 ===== */
function convertEV(ev){

  let parts = ev.split(" ").map(e=>{
    let stat = e[0];
    let val = parseInt(e.slice(1));

    if(val>=252) val=32;
    else if(val>=4) val=2;
    else val=0;

    return {stat,val};
  });

  let total = parts.reduce((a,b)=>a+b.val,0);

  let i=0;
  while(total<66){
    if(parts[i].val<32){
      parts[i].val+=2;
      total+=2;
    }
    i=(i+1)%parts.length;
  }

  return parts.map(p=>p.stat+p.val).join(" ");
}

/* ===== 育成 ===== */
const BUILD = {
"ガブリアス":{
  nature:"ようき",
  ability:"さめはだ",
  ev:"A252 S252 H4",
  moves:["じしん","げきりん","つるぎのまい","ステルスロック"]
},
"ドラパルト":{
  nature:"おくびょう",
  ability:"すりぬけ",
  ev:"C252 S252 H4",
  moves:["シャドーボール","りゅうせいぐん","だいもんじ","とんぼがえり"]
},
"ミミッキュ":{
  nature:"いじっぱり",
  ability:"ばけのかわ",
  ev:"A252 S252 H4",
  moves:["じゃれつく","かげうち","つるぎのまい","ドレインパンチ"]
}
};

/* ===== プール ===== */
function getPool(){
  let strong = ALL_POKEMON.filter(p => (TIER[p]||1)>=3);
  let random = [...ALL_POKEMON].sort(()=>0.5-Math.random()).slice(0,10);
  return [...new Set([...strong,...random])];
}

/* ===== 選出 ===== */
function calcScore(team,c){
  let score = TIER[base(c)] || 1;
  team.forEach(()=> score+=1);
  return score;
}

function pickBest(team,pool){
  let sample = pool.sort(()=>0.5-Math.random()).slice(0,5);
  let best=null,score=-999;

  sample.forEach(p=>{
    if(team.includes(p)) return;
    let s = calcScore(team,p);
    if(s>score){score=s;best=p;}
  });

  return best;
}

/* ===== メガ ===== */
function pickMega(n){
  return ALL_MEGA.sort(()=>0.5-Math.random()).slice(0,n);
}

/* ===== 構築タイプ ===== */
function detectBuildType(team){
  let s={スタン:1,サイクル:0,対面:0,天候:0,受け:0};

  team.forEach(p=>{
    let r = ROLE[base(p)]||[];

    if(r.includes("wall")) s["受け"]+=2;
    if(r.includes("cycle")) s["サイクル"]+=2;
    if(r.includes("offense")) s["対面"]+=2;
    if(r.includes("sweeper")) s["対面"]+=1;
    if(r.includes("weather")) s["天候"]+=3;
  });

  return Object.keys(s).reduce((a,b)=> s[a]>s[b]?a:b);
}

/* ===== 勝ち筋 ===== */
function getWinCondition(team){
  let hasSetup=false,hasWall=false,hasWeather=false,hasOffense=false;

  team.forEach(p=>{
    let r = ROLE[base(p)]||[];
    if(r.includes("setup")) hasSetup=true;
    if(r.includes("wall")) hasWall=true;
    if(r.includes("weather")) hasWeather=true;
    if(r.includes("offense")||r.includes("sweeper")) hasOffense=true;
  });

  if(hasWeather) return "天候展開 → エースで全抜き";
  if(hasSetup && hasOffense) return "積みエースで全抜き";
  if(hasWall && hasOffense) return "受け回しで削る";
  if(hasOffense) return "対面で押し切る";

  return "バランス構築";
}

/* ===== エース ===== */
function detectAce(team){

  let best=null,score=-999,reason="";

  team.forEach(p=>{
    let r = ROLE[base(p)]||[];
    let s = (TIER[base(p)]||1)*2;
    let rs=[];

    if(r.includes("sweeper")){s+=3;rs.push("全抜き性能");}
    if(r.includes("setup")){s+=2;rs.push("積み性能");}
    if(r.includes("offense")){s+=2;rs.push("対面性能");}
    if(r.includes("weather")){s+=3;rs.push("天候エース");}

    if(s>score){
      score=s;
      best=p;
      reason=rs.join("・");
    }
  });

  return {ace:best,reason};
}

/* ===== 生成 ===== */
function gen(){

  let team=[];

  let megaCount=parseInt(document.getElementById("megaCount").value);

  team = team.concat(pickMega(megaCount));

  let pool = getPool();

  while(team.length<6){
    let p = pickBest(team,pool);
    if(!p) break;
    team.push(p);
  }

  render(team);
}

/* ===== 表示 ===== */
function render(team){

  let type = detectBuildType(team);
  let win = getWinCondition(team);
  let ace = detectAce(team);

  let html = `<div class="card">
  <b>構築タイプ：${type}</b><br>
  <b>勝ち筋：${win}</b><br>
  <b>エース：${ace.ace}</b><br>
  <small>${ace.reason}</small><br><br>`;

  team.forEach(p=>{
    html += `<div class="poke" onclick="showDetail('${p}')">${p}</div>`;
  });

  html += `</div>`;

  document.getElementById("out").innerHTML = html;
}

/* ===== 詳細 ===== */
function showDetail(name){

  let b = BUILD[base(name)];

  if(!b){
    document.getElementById("modalContent").innerHTML =
      `<b>${name}</b><br>データなし`;
  }else{

    document.getElementById("modalContent").innerHTML =
      `<b>${name}</b><br><br>
      性格：${getNatureText(b.nature)}<br>
      特性：${b.ability}<br>
      努力値：${convertEV(b.ev)}<br>
      技：${b.moves.join(" / ")}`;
  }

  document.getElementById("modal").style.display="block";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

</script>
</body>
</html>
