<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>構築AI 完全版</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1ff;}
header{background:#3b4cca;color:white;padding:12px;text-align:center;}

.card{background:white;margin:10px;padding:12px;border-radius:12px;}

button{
width:100%;padding:10px;margin-top:10px;
border:none;border-radius:8px;background:#ff0000;color:white;
}

.poke{padding:10px;border-bottom:1px solid #eee;cursor:pointer;}

.history-card{
background:white;margin-top:8px;padding:8px;
border-radius:10px;border:1px solid #ddd;font-size:12px;
}

#modal{
display:none;position:fixed;top:0;left:0;
width:100%;height:100%;background:rgba(0,0,0,0.6);
}

.modal-inner{
background:white;margin:20% auto;padding:20px;
width:85%;border-radius:12px;
}
</style>
</head>

<body>

<header>構築AI 完全版</header>

<div class="card">
使いたいポケモン
<select id="favPokemon"></select>

<button onclick="gen()">構築生成</button>
</div>

<div id="out"></div>
<div id="history" class="card"></div>

<div id="modal">
<div class="modal-inner">
<div id="modalContent"></div>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>

/* =========================
   データ
========================= */

const ALL_POKEMON = [
"ガブリアス","カイリュー","ドラパルト","ミミッキュ",
"ドドゲザン","サザンドラ","ウルガモス","ゲンガー",
"ドヒドイデ","アーマーガア","カバルドン",
"ロトム(ウォッシュ)","ロトム(ヒート)","ロトム(フロスト)",
"ロトム(スピン)","ロトム(カット)",
"エルフーン","バンギラス","ギャラドス","ルカリオ"
];

const TYPE = {
"ガブリアス":["ドラゴン","じめん"],
"カイリュー":["ドラゴン","ひこう"],
"ドラパルト":["ドラゴン","ゴースト"],
"ミミッキュ":["ゴースト","フェアリー"],
"ドドゲザン":["あく","はがね"],
"サザンドラ":["あく","ドラゴン"],
"ウルガモス":["むし","ほのお"],
"ゲンガー":["ゴースト","どく"],
"ドヒドイデ":["みず","どく"],
"アーマーガア":["ひこう","はがね"],
"カバルドン":["じめん"],
"ロトム(ウォッシュ)":["でんき","みず"],
"ロトム(ヒート)":["でんき","ほのお"],
"ロトム(フロスト)":["でんき","こおり"],
"ロトム(スピン)":["でんき","ひこう"],
"ロトム(カット)":["でんき","くさ"],
"エルフーン":["くさ","フェアリー"],
"バンギラス":["いわ","あく"],
"ギャラドス":["みず","ひこう"],
"ルカリオ":["かくとう","はがね"]
};

const FAMILY = {
"ロトム(ウォッシュ)":"ロトム",
"ロトム(ヒート)":"ロトム",
"ロトム(フロスト)":"ロトム",
"ロトム(スピン)":"ロトム",
"ロトム(カット)":"ロトム"
};

const ITEMS = ["タスキ","珠","残飯","スカーフ","ラム"];

/* =========================
   初期化
========================= */

function initSelect(){
let s=document.getElementById("favPokemon");
s.innerHTML="<option value=''>なし</option>";
ALL_POKEMON.forEach(p=>{
let o=document.createElement("option");
o.value=p;o.textContent=p;
s.appendChild(o);
});
}
initSelect();

/* =========================
   ユーティリティ
========================= */

function base(p){
return FAMILY[p] || p;
}

function isDuplicate(team,p){
let fam = FAMILY[p] || p;
return team.some(x => (FAMILY[x]||x) === fam);
}

function getItem(){
return ITEMS[Math.floor(Math.random()*ITEMS.length)];
}

/* =========================
   弱点判定（簡易）
========================= */

const TYPE_CHART = {
"でんき":{"みず":2,"ひこう":2,"じめん":0},
"じめん":{"でんき":2,"ほのお":2,"はがね":2},
"こおり":{"ドラゴン":2,"ひこう":2}
};

function getMultiplier(atk,def){
let m=1;
def.forEach(d=>{
let v=(TYPE_CHART[atk]||{})[d];
if(v===0)m*=0;
else if(v)m*=v;
});
return m;
}

function detectWeakness(team){
let res={};

Object.keys(TYPE_CHART).forEach(t=>{
let s=0;
team.forEach(p=>{
let m=getMultiplier(t,TYPE[p]||[]);
if(m===0)s-=2;
else if(m>=2)s+=1;
});
res[t]=s;
});

return Object.entries(res).sort((a,b)=>b[1]-a[1]).slice(0,2);
}

function getWeakText(team){
return detectWeakness(team).map(x=>x[0]).join(" / ");
}

/* =========================
   スコアAI
========================= */

function scorePokemon(p,team){

let score=0;
let types=TYPE[p]||[];

team.forEach(t=>{
let tt=TYPE[t]||[];
if(tt.some(x=>types.includes(x))) score-=3;
});

let weak = detectWeakness(team).map(x=>x[0]);

weak.forEach(w=>{
let m=getMultiplier(w,types);
if(m===0)score+=4;
else if(m<=0.5)score+=2;
});

return score;
}

/* =========================
   生成AI（核心）
========================= */

function gen(){

let team=[];

let fav=document.getElementById("favPokemon").value;
if(fav) team.push(fav);

while(team.length<6){

let candidates=ALL_POKEMON.filter(p=>{
if(team.includes(p)) return false;
if(isDuplicate(team,p)) return false;
return true;
});

let scored=candidates.map(p=>({
p,
s:scorePokemon(p,team)
}));

scored.sort((a,b)=>b.s-a.s);

team.push(scored[0].p);
}

team=team.map(p=>({
name:p,
item:getItem()
}));

saveHistory(team);
render(team);
}

/* =========================
   表示
========================= */

let HISTORY=[];

function saveHistory(team){
HISTORY.unshift({team});
if(HISTORY.length>10)HISTORY.pop();
}

function render(team){

let names=team.map(t=>t.name);

let html=`<div class="card">
<b>負け筋：</b>${getWeakText(names)}<br><br>`;

team.forEach(p=>{
html+=`
<div class="poke" onclick="showDetail('${p.name}','${p.item}')">
${p.name}（${p.item}）
</div>`;
});

html+=`</div>`;

document.getElementById("out").innerHTML=html;
renderHistory();
}

/* =========================
   詳細モーダル
========================= */

function showDetail(name,item){

document.getElementById("modalContent").innerHTML=
`<b>${name}</b><br>持ち物：${item}`;

document.getElementById("modal").style.display="block";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* =========================
   履歴
========================= */

function renderHistory(){

let html="<b>履歴</b>";

HISTORY.forEach((h,i)=>{

let short=h.team.map(t=>t.name).slice(0,3).join("・");

html+=`
<div class="history-card" onclick="openHistory(${i})">
#${i+1} ${short}
</div>`;
});

document.getElementById("history").innerHTML=html;
}

function openHistory(i){

let team=HISTORY[i].team;

let html="<b>構築詳細</b><br><hr>";

team.forEach(p=>{
html+=`${p.name}（${p.item}）<br>`;
});

document.getElementById("modalContent").innerHTML=html;
document.getElementById("modal").style.display="block";
}

</script>

</body>
</html>
