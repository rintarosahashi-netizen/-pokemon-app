<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ポケモン構築AI</title>

<link rel="apple-touch-icon" href="icon.png.PNG">

<style>

body{
  margin:0;
  font-family:-apple-system;
  background:#eef1ff;
}

/* ===== ホーム ===== */
#home{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#3b4cca,#ff0000);
  color:white;
}

.home-title{
  font-size:22px;
  font-weight:bold;
  margin-bottom:20px;
}

.home-btn{
  width:80%;
  padding:15px;
  margin:10px;
  border:none;
  border-radius:15px;
  font-size:16px;
  font-weight:bold;
}

/* ===== アプリ ===== */
header{
  background:#3b4cca;
  color:white;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.card{
  background:white;
  margin:10px auto;
  padding:12px;
  border-radius:15px;
  max-width:500px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  animation:fadeIn 0.25s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* ===== ボタン ===== */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#ff0000;
  color:white;
  font-weight:bold;
  font-size:16px;
}

button:active{
  transform:scale(0.97);
}

/* ===== ポケモン ===== */
.poke{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.name{
  font-weight:bold;
}

.type{
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  color:white;
  font-size:12px;
  margin-right:5px;
}

.ゴースト{background:#705898;}
.フェアリー{background:#ee99ac;}
.ドラゴン{background:#7038f8;}
.あく{background:#705848;}
.はがね{background:#b8b8d0;}
.みず{background:#6890f0;}
.どく{background:#a040a0;}

.hidden{display:none;}

</style>
</head>

<body>

<!-- ===== HOME ===== -->
<div id="home">
  <div class="home-title">ポケモン構築AI</div>
  <button class="home-btn" onclick="start()">🔥 今日の構築</button>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">

<header>構築生成</header>

<div class="card">
  <select id="megaCount">
    <option value="1">メガ1体</option>
    <option value="2">メガ2体</option>
  </select>

  <button onclick="gen()">構築を生成</button>
</div>

<div id="out"></div>
<div id="detail"></div>

</div>

<script>

/* ===== 表示切替 ===== */
function start(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}

/* ===== データ ===== */
const pool = ["ミミッキュ","ドラパルト","ドドゲザン","ドヒドイデ","ガブリアス"];

const types = {
  "ミミッキュ":["ゴースト","フェアリー"],
  "ドラパルト":["ドラゴン","ゴースト"],
  "ドドゲザン":["あく","はがね"],
  "ドヒドイデ":["みず","どく"],
  "ガブリアス":["ドラゴン"]
};

const megaPool = ["メガガブリアス","メガサーナイト"];

/* ===== 重複防止 ===== */
function base(p){ return p.replace("メガ",""); }

/* ===== 構築生成 ===== */
function gen(){

  let team = [];

  let megaCount = parseInt(document.getElementById("megaCount").value);

  // メガ
  for(let i=0;i<megaCount;i++){
    team.push(megaPool[Math.floor(Math.random()*megaPool.length)]);
  }

  // 残り
  while(team.length<6){
    let p = pool[Math.floor(Math.random()*pool.length)];
    if(!team.some(x=>base(x)===base(p))){
      team.push(p);
    }
  }

  let html = `<div class="card">`;

  team.forEach(p=>{
    let t = types[base(p)] || [];

    html += `
    <div class="poke" onclick="detail('${p}')">
      <div class="name">${p}</div>`;

    t.forEach(tp=>{
      html += `<span class="type ${tp}">${tp}</span>`;
    });

    html += `</div>`;
  });

  html += `</div>`;

  document.getElementById("out").innerHTML = html;
}

/* ===== 詳細 ===== */
function detail(p){
  document.getElementById("detail").innerHTML = `
  <div class="card">
    <b>${p}</b><br>
    性格・努力値・技（ここ拡張可能）
  </div>`;
}

</script>

</body>
</html>
