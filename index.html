<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ポケモン構築AI</title>

<style>

body{
  margin:0;
  font-family:-apple-system;
  background:#eef1ff;
}

header{
  background:#3b4cca;
  color:white;
  padding:12px;
  text-align:center;
}

/* カード */
.card{
  background:white;
  margin:10px auto;
  padding:12px;
  border-radius:14px;
  max-width:500px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ボタン */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff0000;
  color:white;
  font-weight:bold;
}

/* ポケモン */
.poke{
  padding:10px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.name{
  font-weight:bold;
}

/* タイプ */
.type{
  display:inline-block;
  padding:3px 6px;
  border-radius:6px;
  color:white;
  font-size:12px;
  margin-right:4px;
}

.hidden{display:none;}

</style>
</head>

<body>

<header>構築AI（履歴付き）</header>

<div class="card">
  <button onclick="gen()">構築生成</button>
  <button onclick="clearHistory()">履歴クリア</button>
</div>

<div id="out"></div>
<div id="history"></div>

<script>

function base(p){ return p.replace("メガ",""); }

/* =========================
   全ポケモンデータ（拡張前提）
========================= */

const POKEDEX = {
  "ミミッキュ":{type:["ゴースト","フェアリー"]},
  "ドラパルト":{type:["ドラゴン","ゴースト"]},
  "ドドゲザン":{type:["あく","はがね"]},
  "ドヒドイデ":{type:["みず","どく"]},
  "ガブリアス":{type:["ドラゴン","じめん"]},
  "サーナイト":{type:["フェアリー"]},
  "カイリュー":{type:["ドラゴン","ひこう"]},
  "バンギラス":{type:["いわ","あく"]},
  "ウーラオス":{type:["かくとう"]},
  "ハバタクカミ":{type:["ゴースト","フェアリー"]}
};

/* メガ */
const megaPool = ["メガガブリアス","メガサーナイト"];

/* =========================
   履歴
========================= */

function saveHistory(team){
  let history = JSON.parse(localStorage.getItem("history") || "[]");
  history.unshift(team);
  history = history.slice(0,10);
  localStorage.setItem("history", JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  let history = JSON.parse(localStorage.getItem("history") || "[]");

  let html = `<div class="card"><b>履歴</b>`;

  history.forEach((team,i)=>{
    html += `<div style="margin-top:8px;">#${i+1}<br>`;
    team.forEach(p=>{
      html += `${p} `;
    });
    html += `</div>`;
  });

  html += `</div>`;

  document.getElementById("history").innerHTML = html;
}

function clearHistory(){
  localStorage.removeItem("history");
  renderHistory();
}

/* =========================
   構築生成
========================= */

function gen(){

  let team = [];

  // メガ1体固定
  team.push(megaPool[Math.floor(Math.random()*megaPool.length)]);

  // 通常
  let keys = Object.keys(POKEDEX);

  while(team.length<6){
    let p = keys[Math.floor(Math.random()*keys.length)];

    if(!team.some(x=>base(x)===base(p))){
      team.push(p);
    }
  }

  renderTeam(team);
  saveHistory(team);
}

/* =========================
   表示
========================= */

function renderTeam(team){

  let html = `<div class="card">`;

  team.forEach(p=>{
    let data = POKEDEX[base(p)] || {type:["不明"]};

    html += `
    <div class="poke">
      <div class="name">${p}</div>`;

    data.type.forEach(t=>{
      html += `<span class="type">${t}</span>`;
    });

    html += `</div>`;
  });

  html += `</div>`;

  document.getElementById("out").innerHTML = html;
}

renderHistory();

</script>

</body>
</html>
